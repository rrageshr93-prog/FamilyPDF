stages:
  - validate
  - fdroid

default:
  image: registry.gitlab.com/fdroid/docker-executable-fdroidserver:master
  before_script:
    - chmod +x ci/fdroid/validate_metadata.sh
    # Silence fdroidserver warning if config.yml is present in repo/CI.
    - if [ -f config.yml ]; then chmod 600 config.yml || true; fi

variables:
  GIT_DEPTH: "0"

validate:metadata:
  stage: validate
  script:
    - ./ci/fdroid/validate_metadata.sh
  rules:
    - if: $CI_PIPELINE_SOURCE

fdroid:lint:
  stage: fdroid
  needs: ["validate:metadata"]
  script:
    - |
      set -e
      if [ -d metadata ]; then
        # Run lint for all apps present in this repo's metadata folder.
        for f in metadata/*.yml; do
          [ -f "$f" ] || continue
          appid="$(basename "$f" .yml)"
          echo "== fdroid lint: $appid =="
          fdroid lint "$appid"
        done
      else
        echo "No metadata/ directory found; nothing to lint."
      fi
  rules:
    - if: $CI_PIPELINE_SOURCE

fdroid:rewritemeta:
  stage: fdroid
  needs: ["validate:metadata"]
  script:
    - |
      set -e
      if [ -d metadata ]; then
        for f in metadata/*.yml; do
          [ -f "$f" ] || continue
          appid="$(basename "$f" .yml)"
          echo "== fdroid rewritemeta: $appid =="
          fdroid rewritemeta "$appid"
        done
      else
        echo "No metadata/ directory found; nothing to rewritemeta."
      fi
  rules:
    - if: $CI_PIPELINE_SOURCE

# NOTE: `checkupdates` and `build` typically require additional setup (Android SDK, keystore,
# fdroidserver config, srclibs). If you want them in GitLab CI too, we can extend this file
# once you confirm where your fdroiddata repo/config live.

