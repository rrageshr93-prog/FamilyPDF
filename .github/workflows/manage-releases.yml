name: Manage Releases and Prune Old Versions

on:
  push:
    branches:
      - master
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., 1.3.32) - leave empty to use VERSION file'
        required: false
        default: ''
      force_build:
        description: 'Force build even if tag exists'
        required: false
        default: false
        type: boolean

# Required permissions for the workflow
permissions:
  contents: write  # Needed to create/delete releases, tags, and commit files
  actions: write   # Needed for workflow operations

jobs:
  manage-releases:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code with full history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Fetch all history for tags
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
      
      - name: Create releases directory
        run: |
          mkdir -p releases
          echo "Releases directory created/verified"
      
      - name: Check for build artifacts
        id: check-artifacts
        run: |
          # Check if there are any AAB files in the expected location
          if ls app/build/outputs/bundle/playstoreRelease/*.aab 1> /dev/null 2>&1; then
            echo "artifacts_exist=true" >> $GITHUB_OUTPUT
            echo "Found build artifacts"
          else
            echo "artifacts_exist=false" >> $GITHUB_OUTPUT
            echo "No build artifacts found - skipping artifact copy"
          fi
      
      - name: Copy latest build artifacts to releases folder
        if: steps.check-artifacts.outputs.artifacts_exist == 'true'
        run: |
          # Copy AAB files if they exist
          if ls app/build/outputs/bundle/playstoreRelease/*.aab 1> /dev/null 2>&1; then
            cp app/build/outputs/bundle/playstoreRelease/*.aab releases/
            echo "Copied AAB files to releases/"
          fi
          
          # Copy mapping files if they exist
          if [ -f app/build/outputs/mapping/playstoreRelease/mapping.txt ]; then
            cp app/build/outputs/mapping/playstoreRelease/mapping.txt releases/mapping-$(date +%Y%m%d-%H%M%S).txt
            echo "Copied mapping file to releases/"
          fi
          
          ls -lh releases/
      
      - name: Commit and push releases folder
        if: steps.check-artifacts.outputs.artifacts_exist == 'true'
        run: |
          git add releases/
          
          # Check if there are changes to commit
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update releases folder with latest build artifacts [skip ci]"
            git push origin master
            echo "Pushed releases folder updates"
          fi
      
      - name: Generate unique tag
        id: generate-tag
        run: |
          # Use manual input version if provided, otherwise use VERSION file
          if [ -n "${{ github.event.inputs.version }}" ]; then
            VERSION="${{ github.event.inputs.version }}"
          elif [ -f VERSION ]; then
            VERSION=$(cat VERSION | tr -d '[:space:]')
          else
            echo "No VERSION file found. Skipping release creation."
            echo "tag=" >> $GITHUB_OUTPUT
            exit 0
          fi
          
          TAG="v${VERSION}"
          FORCE_BUILD="${{ github.event.inputs.force_build }}"
          
          # Check if tag already exists
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            if [ "$FORCE_BUILD" = "true" ]; then
              echo "Tag $TAG exists but force_build is enabled. Adding commit SHA."
              SHORT_SHA=$(git rev-parse --short HEAD)
              TAG="${TAG}-${SHORT_SHA}"
            else
              echo "Tag $TAG already exists. Skipping release."
              echo "tag=" >> $GITHUB_OUTPUT
              exit 0
            fi
          fi
          
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Generated tag: $TAG"
      
      - name: Create GitHub Release
        if: steps.generate-tag.outputs.tag != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.generate-tag.outputs.tag }}"
          
          # Get version info
          if [ -f VERSION ]; then
            VERSION=$(cat VERSION | tr -d '[:space:]')
          else
            VERSION="dev"
          fi
          
          # Simple auto-incrementing VERSION_CODE
          # Read current VERSION_CODE or default to 1
          if [ -f VERSION_CODE ]; then
            CURRENT_CODE=$(cat VERSION_CODE | tr -d '[:space:]')
            # Increment by 1
            VERSION_CODE=$(( CURRENT_CODE + 1 ))
          else
            VERSION_CODE=1
          fi
          
          # Save new VERSION_CODE back to file
          echo "$VERSION_CODE" > VERSION_CODE
          
          # Commit the VERSION_CODE update
          git add VERSION_CODE
          git commit -m "chore: bump VERSION_CODE to $VERSION_CODE [skip ci]" || echo "No changes to commit"
          git push origin master || echo "Push failed"
          
          # Get latest commit message
          COMMIT_MSG=$(git log -1 --pretty=format:"%s")
          
          # Create release notes
          cat > release_notes.md <<EOF
          ## PDF Toolkit ${VERSION} (Build ${VERSION_CODE})
          
          ### Changes
          ${COMMIT_MSG}
          
          ### Build Info
          - Version: ${VERSION}
          - Build Code: ${VERSION_CODE}
          - Commit: $(git rev-parse --short HEAD)
          - Date: $(date -u +"%Y-%m-%d %H:%M:%S UTC")
          
          ### Downloads
          **Universal APK** - Works on all Android devices (ARM64, ARMv7, x86_64, x86)
          **Play Store AAB** - Android App Bundle for Play Store distribution
          
          ### Installation
          1. Download the APK for your architecture (or Universal APK)
          2. Enable "Install from unknown sources" in Android settings
          3. Open the downloaded APK file
          
          EOF
          
          # Create the release
          gh release create "$TAG" \
            --title "Release ${VERSION}" \
            --notes-file release_notes.md \
            --target master
          
          echo "Created release: $TAG with VERSION_CODE: $VERSION_CODE"
      
      - name: Build APKs for GitHub Release
        if: steps.generate-tag.outputs.tag != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.generate-tag.outputs.tag }}"
          
          # Setup JDK
          sudo apt-get update && sudo apt-get install -y openjdk-17-jdk
          export JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64
          
          # Make gradlew executable
          chmod +x gradlew
          
          # Build APK files for sideloading
          ./gradlew assemblePlaystoreRelease
          
          # Upload APKs to release
          if [ -f app/build/outputs/apk/playstore/release/app-playstore-release.apk ]; then
            gh release upload "$TAG" app/build/outputs/apk/playstore/release/app-playstore-release.apk --clobber || echo "Failed to upload universal APK"
          fi
          
          # Also try to upload per-arch APKs if they exist
          for apk in app/build/outputs/apk/playstore/release/*.apk; do
            if [ -f "$apk" ]; then
              gh release upload "$TAG" "$apk" --clobber || echo "Failed to upload $apk"
            fi
          done
          
          # Upload AAB
          if [ -f app/build/outputs/bundle/playstoreRelease/app-playstoreRelease.aab ]; then
            gh release upload "$TAG" app/build/outputs/bundle/playstoreRelease/app-playstoreRelease.aab --clobber || echo "Failed to upload AAB"
          fi
          
          echo "Uploaded all artifacts to release: $TAG"
      
      - name: Prune old releases (keep latest 10, skip pinned)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Fetching all releases..."
          
          # Get all release tags sorted by creation date (newest first)
          RELEASES=$(gh release list --limit 1000 --json tagName,createdAt --jq 'sort_by(.createdAt) | reverse | .[].tagName')
          
          # Convert to array
          RELEASE_ARRAY=($RELEASES)
          TOTAL_RELEASES=${#RELEASE_ARRAY[@]}
          
          echo "Total releases found: $TOTAL_RELEASES"
          
          # Check if we have more than 10 releases
          if [ $TOTAL_RELEASES -le 10 ]; then
            echo "Only $TOTAL_RELEASES releases exist. No pruning needed (keeping all)."
            exit 0
          fi
          
          # Calculate how many to delete
          TO_DELETE=$((TOTAL_RELEASES - 10))
          echo "Will delete $TO_DELETE old releases (keeping latest 10)"
          
          # Delete old releases (skip first 10, delete the rest)
          # Skip releases with 'pinned' in the name or specific pinned versions
          PINNED_TAGS=("v1.3.128")
          
          DELETED_COUNT=0
          for ((i=10; i<$TOTAL_RELEASES; i++)); do
            TAG="${RELEASE_ARRAY[$i]}"
            
            # Skip pinned releases
            IS_PINNED=false
            for PINNED in "${PINNED_TAGS[@]}"; do
              if [ "$TAG" = "$PINNED" ]; then
                IS_PINNED=true
                echo "Skipping pinned release: $TAG"
                break
              fi
            done
            
            # Also skip if tag contains 'pinned' or 'keep'
            if [[ "$TAG" == *"pinned"* ]] || [[ "$TAG" == *"keep"* ]]; then
              IS_PINNED=true
              echo "Skipping protected release: $TAG"
            fi
            
            if [ "$IS_PINNED" = true ]; then
              continue
            fi
            
            echo "Deleting release and tag: $TAG"
            
            # Delete the release
            gh release delete "$TAG" --yes || echo "Failed to delete release $TAG"
            
            # Delete the tag from remote
            git push origin --delete "$TAG" || echo "Failed to delete tag $TAG from remote"
            
            DELETED_COUNT=$((DELETED_COUNT + 1))
            
            # Stop if we've deleted enough
            if [ $DELETED_COUNT -ge $TO_DELETE ]; then
              break
            fi
          done
          
          echo "Pruning complete. Deleted $DELETED_COUNT releases. Kept latest 10 + any pinned releases."
      
      - name: Summary
        if: always()
        run: |
          echo "=== Release Management Summary ==="
          echo "Artifacts copied: ${{ steps.check-artifacts.outputs.artifacts_exist }}"
          echo "New tag created: ${{ steps.generate-tag.outputs.tag }}"
          echo "Releases pruned: Old releases beyond the latest 10 were removed (pinned releases preserved)"
          echo "=================================="
