name: Release Dual APKs

on:
  push:
    tags:
      - 'v*'
      - 'release-*'

# Cancel any in-progress runs for the same tag
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Write permission needed for GitHub releases
permissions:
  contents: write
  actions: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    
    env:
      # Offset to ensure version codes exceed any previously uploaded ones
      VERSION_CODE_OFFSET: 52
      # Major.Minor prefix for versionName
      VERSION_PREFIX: '1.3'

    steps:
      # ════════════════════════════════════════════════════════════════════════════════
      # 1. Checkout the repository
      # ════════════════════════════════════════════════════════════════════════════════
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for proper versioning

      # ════════════════════════════════════════════════════════════════════════════════
      # 2. Set up Java (required for Android/Gradle)
      # ════════════════════════════════════════════════════════════════════════════════
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      # ════════════════════════════════════════════════════════════════════════════════
      # 3. Extract Version from Tag
      # ════════════════════════════════════════════════════════════════════════════════
      - name: Extract Version from Tag
        id: version
        run: |
          # Extract tag name (e.g., v1.3.60 -> 1.3.60)
          TAG_NAME="${{ github.ref_name }}"
          if [[ "$TAG_NAME" == v* ]]; then
            VERSION_NAME="${TAG_NAME#v}"
          else
            VERSION_NAME="$TAG_NAME"
          fi
          
          # Compute version code from tag or use offset + run number
          OFFSET=${{ env.VERSION_CODE_OFFSET }}
          RUN_NUM=${{ github.run_number }}
          VERSION_CODE=$(( RUN_NUM + OFFSET ))
          
          echo "APP_VERSION_CODE=$VERSION_CODE" >> $GITHUB_ENV
          echo "APP_VERSION_NAME=$VERSION_NAME" >> $GITHUB_ENV
          echo "TAG_NAME=$TAG_NAME" >> $GITHUB_ENV
          
          echo "================================================"
          echo "Tag: $TAG_NAME"
          echo "Version Name: $VERSION_NAME"
          echo "Version Code: $VERSION_CODE"
          echo "================================================"

      # ════════════════════════════════════════════════════════════════════════════════
      # 4. Generate Release Notes
      # ════════════════════════════════════════════════════════════════════════════════
      - name: Generate Release Notes
        id: generate-notes
        run: |
          # Extract the latest commit message for release metadata
          COMMIT_MSG=$(git log -1 --pretty=format:"%s")
          COMMIT_HASH=$(git log -1 --pretty=format:"%h")
          BUILD_DATE=$(date -u +"%Y-%m-%d")
          
          cat > release_notes.md <<EOF
          ## PDF Toolkit v${{ env.APP_VERSION_NAME }} (Build ${{ env.APP_VERSION_CODE }})
          
          **Release Date:** ${BUILD_DATE}  
          **Commit:** ${COMMIT_HASH}  
          **Latest Change:** ${COMMIT_MSG}
          
          ### 📱 APK Downloads
          
          Two variants are available for this release:
          
          #### 1. **Play Store Variant** 
          
          
          
          - **File:** 
          - **Purpose:** Standard release with Play Services integration
          - **Features:**
            - ML Kit OCR (smaller APK, downloads ML models on-demand)
            - Google Play In-App Review API
            - Optimized for Play Store distribution
          - **Best for:** Most users installing from GitHub or sideloading
          
          #### 2. **Open Source Variant** 
          
          
          
          - **File:** 
          - **Purpose:** Fully open source build with no proprietary dependencies
          - **Features:**
            - Tesseract OCR (fully offline, larger APK but no runtime downloads)
            - No Firebase dependencies
            - No Google Play Services dependencies
            - 100% FOSS (Free and Open Source Software)
          - **Best for:** Privacy-conscious users, F-Droid users, open source enthusiasts
          
          ### ⚠️ Important Notes
          
          - The Play Store variant requires Google Play Services for OCR functionality
          - The Open Source variant includes all OCR data built-in (larger download but works offline)
          - Both variants are signed with the same release keystore
          - Choose the Open Source variant if you want a fully de-Googled experience
          
          ### 🔧 Build Information
          - Version Code: ${{ env.APP_VERSION_CODE }}
          - Min SDK: 26 (Android 8.0)
          - Target SDK: 35 (Android 15)
          - Build Number: ${{ github.run_number }}
          EOF
          
          echo "=== Release Notes ==="
          cat release_notes.md

      # ════════════════════════════════════════════════════════════════════════════════
      # 5. Decode the Android Keystore from secrets
      # ════════════════════════════════════════════════════════════════════════════════
      - name: Decode Keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > keystore.jks
          cp keystore.jks app/keystore.jks
          echo "Keystore decoded successfully"

      # ════════════════════════════════════════════════════════════════════════════════
      # 6. Make gradlew executable
      # ════════════════════════════════════════════════════════════════════════════════
      - name: Make gradlew executable
        run: chmod +x gradlew

      # ════════════════════════════════════════════════════════════════════════════════
      # 7. Build Play Store APK
      # ════════════════════════════════════════════════════════════════════════════════
      - name: Build Play Store APK
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          ANDROID_KEYSTORE_FILE: keystore.jks
          APP_VERSION_CODE: ${{ env.APP_VERSION_CODE }}
          APP_VERSION_NAME: ${{ env.APP_VERSION_NAME }}
          CI: true
        run: |
          echo "Building Play Store APK — versionCode=${{ env.APP_VERSION_CODE }}, versionName=${{ env.APP_VERSION_NAME }}"
          ./gradlew assemblePlaystoreRelease

      # ════════════════════════════════════════════════════════════════════════════════
      # 8. Build Open Source APK
      # ════════════════════════════════════════════════════════════════════════════════
      - name: Build Open Source APK
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          ANDROID_KEYSTORE_FILE: keystore.jks
          APP_VERSION_CODE: ${{ env.APP_VERSION_CODE }}
          APP_VERSION_NAME: ${{ env.APP_VERSION_NAME }}
          CI: true
        run: |
          echo "Building Open Source APK — versionCode=${{ env.APP_VERSION_CODE }}, versionName=${{ env.APP_VERSION_NAME }}"
          ./gradlew assembleOpensourceRelease

      # ════════════════════════════════════════════════════════════════════════════════
      # 9. Verify Build Outputs
      # ════════════════════════════════════════════════════════════════════════════════
      - name: Verify Build Outputs
        run: |
          echo "=== Play Store APK ==="
          ls -lh app/build/outputs/apk/playstore/release/*.apk || echo "Play Store APK not found"
          
          echo "=== Open Source APK ==="
          ls -lh app/build/outputs/apk/opensource/release/*.apk || echo "Open Source APK not found"
          
          echo "=== Mapping Files ==="
          ls -lh app/build/outputs/mapping/*/mapping.txt || echo "No mapping files found"
          
          echo "=== Version Info ==="
          echo "versionCode: ${{ env.APP_VERSION_CODE }}"
          echo "versionName: ${{ env.APP_VERSION_NAME }}"

      # ════════════════════════════════════════════════════════════════════════════════
      # 10. Upload APKs as build artifacts (for debugging)
      # ════════════════════════════════════════════════════════════════════════════════
      - name: Upload APK Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-apks-v${{ env.APP_VERSION_NAME }}
          path: |
            app/build/outputs/apk/playstore/release/*.apk
            app/build/outputs/apk/opensource/release/*.apk
          retention-days: 30

      # ════════════════════════════════════════════════════════════════════════════════
      # 11. Create GitHub Release with Both APKs
      # ════════════════════════════════════════════════════════════════════════════════
      - name: Create GitHub Release
        id: create-release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ env.TAG_NAME }}
          name: Release ${{ env.APP_VERSION_NAME }}
          body_path: release_notes.md
          files: |
            app/build/outputs/apk/playstore/release/pdftoolkit-playstore-v${{ env.APP_VERSION_NAME }}.apk
            app/build/outputs/apk/opensource/release/pdftoolkit-opensource-v${{ env.APP_VERSION_NAME }}.apk
            app/build/outputs/mapping/playstoreRelease/mapping.txt
            app/build/outputs/mapping/opensourceRelease/mapping.txt
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ════════════════════════════════════════════════════════════════════════════════
      # 12. Prune Old Releases (Keep Only 3)
      # ════════════════════════════════════════════════════════════════════════════════
      - name: Prune Old Releases
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Fetching all releases..."
          
          # Get all release tags sorted by creation date (newest first)
          RELEASES=$(gh release list --limit 1000 --json tagName,createdAt --jq 'sort_by(.createdAt) | reverse | .[].tagName')
          
          # Convert to array
          RELEASE_ARRAY=($RELEASES)
          TOTAL_RELEASES=${#RELEASE_ARRAY[@]}
          
          echo "Total releases found: $TOTAL_RELEASES"
          
          # Check if we have more than 3 releases
          if [ $TOTAL_RELEASES -le 3 ]; then
            echo "Only $TOTAL_RELEASES releases exist. No pruning needed (keeping all)."
            exit 0
          fi
          
          # Calculate how many to delete
          TO_DELETE=$((TOTAL_RELEASES - 3))
          echo "Will delete $TO_DELETE old releases (keeping latest 3)"
          
          # Delete old releases (skip first 3, delete the rest)
          for ((i=3; i<$TOTAL_RELEASES; i++)); do
            TAG="${RELEASE_ARRAY[$i]}"
            echo "Deleting release and tag: $TAG"
            
            # Delete the release
            gh release delete "$TAG" --yes || echo "Failed to delete release $TAG"
            
            # Delete the tag from remote
            git push origin --delete "$TAG" || echo "Failed to delete tag $TAG from remote"
          done
          
          echo "Pruning complete. Kept latest 3 releases."

      # ════════════════════════════════════════════════════════════════════════════════
      # 13. Post-release Summary
      # ════════════════════════════════════════════════════════════════════════════════
      - name: Release Summary
        if: success()
        run: |
          echo "## ✅ Release Successful!" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Detail | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| **App** | PDF Toolkit |" >> $GITHUB_STEP_SUMMARY
          echo "| **Package** | com.yourname.pdftoolkit |" >> $GITHUB_STEP_SUMMARY
          echo "| **Tag** | ${{ env.TAG_NAME }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Version Name** | ${{ env.APP_VERSION_NAME }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Version Code** | ${{ env.APP_VERSION_CODE }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Play Store APK** | pdftoolkit-playstore-v${{ env.APP_VERSION_NAME }}.apk |" >> $GITHUB_STEP_SUMMARY
          echo "| **Open Source APK** | pdftoolkit-opensource-v${{ env.APP_VERSION_NAME }}.apk |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 📥 Downloads" >> $GITHUB_STEP_SUMMARY
          echo "- [Play Store Variant](https://github.com/${{ github.repository }}/releases/tag/${{ env.TAG_NAME }})" >> $GITHUB_STEP_SUMMARY
          echo "- [Open Source Variant](https://github.com/${{ github.repository }}/releases/tag/${{ env.TAG_NAME }})" >> $GITHUB_STEP_SUMMARY
