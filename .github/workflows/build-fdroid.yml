- name: Build F-Droid Debug APK
        env:
          APP_VERSION_CODE: ${{ env.APP_VERSION_CODE }}
          APP_VERSION_NAME: ${{ env.APP_VERSION_NAME }}
        run: ./gradlew generateFdroidDebugBuildConfig assembleFdroidDebug --info 2>&1 | grep -E "^e:|error:" | head -50

      - name: Find APK
        run: find app/build/outputs -name "*.apk" -type f

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: FamilyPDF-fdroid-v${{ env.APP_VERSION_NAME }}
          path: app/build/outputs/
          retention-days: 30