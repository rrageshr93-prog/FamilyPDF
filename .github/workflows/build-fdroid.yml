name: Build F-Droid APK (Unsigned)

on:
  workflow_dispatch:
    inputs:
      version_name:
        description: 'Version name (e.g. 1.0.0)'
        required: false
        default: '1.0.0'
      version_code:
        description: 'Version code (e.g. 1)'
        required: false
        default: '1'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Set Version
        run: |
          echo "APP_VERSION_CODE=${{ github.event.inputs.version_code }}" >> $GITHUB_ENV
          echo "APP_VERSION_NAME=${{ github.event.inputs.version_name }}" >> $GITHUB_ENV

      - name: Build F-Droid Debug APK
        run: ./gradlew assembleFdroidDebug --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: FamilyPDF-fdroid-v${{ env.APP_VERSION_NAME }}
          path: app/build/outputs/apk/fdroid/debug/*.apk
          retention-days: 30